global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'erp-backend'
    metrics_path: /api/metrics
    scheme: https
    static_configs:
      - targets: ['tu-dominio.com']
    authorization:
      type: Bearer
      credentials: 'CAMBIAR_POR_METRICS_TOKEN'
