<header class="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 sm:px-6 z-10 transition-colors">
  
  <!-- Parte Izquierda (Menu Toggle & Context ) -->
  <div class="flex items-center gap-3">
    <button (click)="toggleSidebar.emit()"
            class="p-2 -ml-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500/50"
            aria-label="Abrir o cerrar menú lateral">
      <mat-icon class="!w-6 !h-6 text-[24px] leading-[24px]">menu_open</mat-icon>
    </button>
    <div class="hidden sm:block text-sm font-medium text-slate-500 dark:text-slate-400">
      Panel de Control
    </div>
  </div>

  <!-- Parte Derecha (Acciones & Usuario) -->
  <div class="flex items-center gap-4">
    
    <!-- Indicador de turno -->
    @if (turnos.turnoActivo()) {
      <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full bg-green-50 dark:bg-green-500/10 border border-green-200 dark:border-green-500/20">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
        </span>
        <span class="text-xs font-medium text-green-700 dark:text-green-400">Turno abierto</span>
      </div>
    }

    <!-- Divisor -->
    <div class="w-px h-6 bg-slate-200 dark:bg-slate-800 hidden sm:block"></div>

    <!-- Menú de Usuario -->
    <button [matMenuTriggerFor]="userMenu"
            class="flex items-center gap-2.5 p-1 pr-2 rounded-full border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all focus:outline-none focus:ring-2 focus:ring-blue-500/50"
            aria-label="Menú de usuario">
      <div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900/50 flex items-center justify-center text-blue-700 dark:text-blue-300 font-bold text-sm">
        {{ auth.usuario()?.nombre?.charAt(0) | uppercase }}
      </div>
      <div class="hidden md:flex flex-col items-start px-1 text-left">
        <span class="text-sm font-semibold text-slate-700 dark:text-slate-200 leading-tight">
          {{ auth.usuario()?.nombre?.split(' ')?.[0] }}
        </span>
        <span class="text-[10px] uppercase tracking-wider text-slate-500 font-medium leading-tight">
          {{ auth.usuario()?.rol }}
        </span>
      </div>
      <mat-icon class="text-slate-400 !w-4 !h-4 text-[16px] leading-[16px]">expand_more</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu" class="!rounded-xl !mt-2 custom-menu-panel">
      <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50">
        <p class="font-bold text-sm text-slate-800 dark:text-slate-200">{{ auth.usuario()?.nombre }}</p>
        <p class="text-xs text-slate-500">{{ auth.usuario()?.correo }}</p>
      </div>
      <div class="py-1">
        <button mat-menu-item class="!flex !items-center !gap-2 !text-sm !text-slate-600 dark:!text-slate-300">
          <mat-icon class="!mr-2 !text-slate-400">person</mat-icon> Mi Perfil
        </button>
        <button mat-menu-item class="!flex !items-center !gap-2 !text-sm !text-slate-600 dark:!text-slate-300">
          <mat-icon class="!mr-2 !text-slate-400">settings</mat-icon> Preferencias
        </button>
      </div>
      <mat-divider class="!border-slate-100 dark:!border-slate-800"></mat-divider>
      <div class="py-1">
        <button mat-menu-item (click)="auth.logout()" class="!flex !items-center !gap-2 !text-sm !text-red-600 dark:!text-red-400 hover:!bg-red-50 dark:hover:!bg-red-500/10">
          <mat-icon class="!mr-2 !text-red-400">logout</mat-icon> Cerrar sesión
        </button>
      </div>
    </mat-menu>

  </div>
</header>
