<!-- POS — Punto de Venta (full-screen optimizado) -->
@if (!turnoActivo()) {
  <div class="flex h-full items-center justify-center bg-gray-50">
    <div class="text-center p-8 bg-white rounded-2xl shadow-xl border border-gray-100 max-w-md">
      <div class="bg-gray-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
        <mat-icon class="!text-5xl text-gray-400 !w-12 !h-12 leading-none">point_of_sale</mat-icon>
      </div>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Caja Cerrada</h2>
      <p class="text-gray-500 mb-6">Debes abrir un turno para comenzar a vender.</p>
      <!-- Aquí podrías poner un botón para ir a turnos si tuvieras la ruta -->
      <div class="p-3 bg-blue-50 text-blue-700 rounded-lg text-sm font-medium">
        Ve al módulo de Turnos de Caja
      </div>
    </div>
  </div>
} @else {
  <div class="pos-layout w-full h-full flex overflow-hidden bg-gray-50">
    <!-- ════════════ PANEL IZQUIERDO: Productos ════════════ -->
    <div class="flex-1 flex flex-col overflow-hidden border-r border-gray-200">
      
      <!-- Toolbar: Búsqueda y Lista de Precios -->
      <app-pos-toolbar
        [terminoBusqueda]="terminoBusqueda()"
        [listaPrecio]="listaPrecio()"
        (searchChange)="onBuscar($event)"
        (searchSubmit)="onEnterSearch($event)"
        (priceChange)="cambiarListaPrecio($event)">
      </app-pos-toolbar>

      <!-- Categorías -->
      <app-pos-categories
        [categories]="categorias()"
        [selectedCategory]="categoriaSeleccionada()"
        (selectCategory)="seleccionarCategoria($event)">
      </app-pos-categories>

      <!-- Lista de Productos -->
      <div class="flex-1 overflow-hidden relative bg-gray-50">
        <app-pos-product-list
          [products]="productos()"
          [loading]="cargandoProductos()"
          (addProduct)="agregarProducto($event)">
        </app-pos-product-list>
      </div>
    </div>

    <!-- ════════════ PANEL DERECHO: Carrito ════════════ -->
    <div class="relative z-10 w-[400px] flex-shrink-0 h-full overflow-hidden">
      <app-pos-cart
        [cartLines]="lineas()"
        [selectedClient]="clienteSeleccionado()"
        (selectClient)="seleccionarCliente()"
        (removeClient)="quitarCliente()"
        (clearCart)="limpiarCarrito()"
        (updateQuantity)="actualizarCantidad($event)"
        (removeLine)="eliminarLinea($event)"
        (checkout)="cobrar()">
      </app-pos-cart>
    </div>
  </div>
}
