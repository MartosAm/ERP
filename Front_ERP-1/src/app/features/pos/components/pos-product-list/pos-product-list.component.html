@if (loading()) {
  <div class="flex flex-col items-center justify-center h-full text-primary">
    <mat-spinner diameter="40"></mat-spinner>
    <p class="mt-4 font-medium animate-pulse">Cargando productos...</p>
  </div>
} @else if (products().length === 0) {
  <div class="flex flex-col items-center justify-center h-full text-gray-400">
    <div class="p-6 bg-gray-50 rounded-full mb-4">
      <mat-icon class="!text-6xl !w-16 !h-16">inventory_2</mat-icon>
    </div>
    <h3 class="text-lg font-semibold text-gray-600">No se encontraron productos</h3>
    <p class="text-sm">Intenta con otra búsqueda o categoría</p>
  </div>
} @else {
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 p-3 overflow-y-auto content-start h-full">
    @for (p of products(); track p.id) {
      <button 
        class="group relative flex flex-col bg-white rounded-xl border border-gray-100 shadow-sm hover:shadow-md hover:border-primary/30 transition-all duration-200 overflow-hidden text-left"
        (click)="onAdd(p)">
        
        <!-- Imagen -->
        <div class="aspect-square w-full bg-gray-50 flex items-center justify-center relative overflow-hidden">
          @if (p.imagenUrl) {
            <img [src]="p.imagenUrl" [alt]="p.nombre" class="object-cover w-full h-full group-hover:scale-105 transition-transform duration-300" />
          } @else {
            <mat-icon class="text-gray-300 !text-5xl !w-12 !h-12">image</mat-icon>
          }
          
          <!-- SKU Tag -->
          <span class="absolute top-2 left-2 bg-white/90 backdrop-blur text-[10px] font-mono px-1.5 py-0.5 rounded text-gray-500 border border-gray-100">
            {{ p.sku }}
          </span>
        </div>

        <!-- Info -->
        <div class="p-3 flex flex-col flex-1 w-full">
          <h4 class="text-sm font-medium text-gray-800 line-clamp-2 leading-tight group-hover:text-primary transition-colors">
            {{ p.nombre }}
          </h4>
          
          <div class="mt-auto pt-2 flex items-center justify-between">
            <span class="text-lg font-bold text-gray-900 tracking-tight">
              {{ p.precioVenta1 | moneda }}
            </span>
          </div>
        </div>
        
        <!-- Efecto al hacer click (ripple casero opcional) -->
        <div class="absolute inset-0 bg-primary/0 group-active:bg-primary/5 transition-colors"></div>
      </button>
    }
  </div>
}
