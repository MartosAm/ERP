<h2 mat-dialog-title class="dialog-title">
  <mat-icon class="text-rose-500 dark:text-rose-400" aria-hidden="true">cancel</mat-icon>
  Cancelar orden
</h2>

<mat-dialog-content class="dialog-content min-w-[380px]">
  <p class="dialog-copy mb-4">
    Esta acción no se puede deshacer. Ingresa el motivo de la cancelación.
  </p>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Motivo de cancelación</mat-label>
      <textarea matInput formControlName="motivo" rows="3"
                placeholder="Describe el motivo (mínimo 5 caracteres)"></textarea>
      @if (form.controls.motivo.hasError('required')) {
        <mat-error>El motivo es obligatorio</mat-error>
      }
      @if (form.controls.motivo.hasError('minlength')) {
        <mat-error>Mínimo 5 caracteres</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button mat-dialog-close aria-label="Volver sin cancelar">Volver</button>
  <button mat-raised-button color="warn" aria-label="Confirmar cancelacion de orden" (click)="confirmar()">
    Cancelar orden
  </button>
</mat-dialog-actions>
