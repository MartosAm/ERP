<h2 mat-dialog-title class="dialog-title flex items-center gap-2">
  <div class="h-10 w-10 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400">
    <mat-icon>edit</mat-icon>
  </div>
  <span class="text-slate-800 dark:text-slate-100 font-semibold text-lg">Editar usuario</span>
</h2>

<mat-dialog-content class="dialog-content flex flex-col gap-4 pt-4">
  <form [formGroup]="form" class="flex flex-col gap-4">
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Teléfono</mat-label>
      <input matInput formControlName="telefono" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Rol</mat-label>
      <mat-select formControlName="rol">
        <mat-option value="ADMIN">Admin</mat-option>
        <mat-option value="CAJERO">Cajero</mat-option>
        <mat-option value="REPARTIDOR">Repartidor</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>

<div class="dialog-actions" mat-dialog-actions>
  <button mat-button mat-dialog-close aria-label="Cancelar">Cancelar</button>
  <button mat-flat-button class="bg-blue-600 text-white hover:bg-blue-700" [disabled]="form.invalid || guardando" (click)="guardar()" aria-label="Guardar usuario">
    Guardar
  </button>
</div>
