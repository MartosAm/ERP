<h2 mat-dialog-title class="dialog-title flex items-center gap-2">
  <div class="h-10 w-10 rounded-full bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center text-orange-600 dark:text-orange-400">
    <mat-icon>{{ esEdicion ? 'edit' : 'warehouse' }}</mat-icon>
  </div>
  <span class="text-slate-800 dark:text-slate-100 font-semibold text-lg">{{ esEdicion ? 'Editar' : 'Nuevo' }} almacén</span>
</h2>

<mat-dialog-content class="dialog-content flex flex-col gap-4">
  <form [formGroup]="form" id="almacenForm" (ngSubmit)="guardar()" class="flex flex-col gap-4 pt-2">
    <!-- Nombre -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" placeholder="Nombre del almacén" />
      @if (form.controls.nombre.hasError('required')) {
        <mat-error>El nombre es obligatorio</mat-error>
      }
      @if (form.controls.nombre.hasError('minlength')) {
        <mat-error>Mínimo 2 caracteres</mat-error>
      }
    </mat-form-field>

    <!-- Dirección -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Dirección</mat-label>
      <textarea matInput formControlName="direccion" placeholder="Dirección del almacén" rows="2"></textarea>
    </mat-form-field>

    <!-- Es principal -->
    <mat-slide-toggle formControlName="esPrincipal" color="primary">
      Almacén principal
    </mat-slide-toggle>
  </form>
</mat-dialog-content>

<div class="dialog-actions" mat-dialog-actions>
  <button mat-button mat-dialog-close [disabled]="guardando()" aria-label="Cancelar">Cancelar</button>
  <button mat-flat-button class="bg-orange-600 text-white hover:bg-orange-700" type="submit" form="almacenForm" [disabled]="guardando()" aria-label="Guardar almacén">
    @if (guardando()) {
      <mat-spinner diameter="18" class="inline-block mr-2"></mat-spinner>
    }
    {{ esEdicion ? 'Actualizar' : 'Crear' }}
  </button>
</div>
