name: ERP CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Back_ERP
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Back_ERP/package.json

      - name: Install deps
        run: npm install

      - name: Verify architecture
        run: ./deploy/scripts/verify_architecture.sh

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --runInBand

      - name: Build backend
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Front_ERP-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Front_ERP-1/package.json

      - name: Install deps
        run: npm install

      - name: Build frontend
        run: npm run build
